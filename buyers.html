<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>doTERRA — Buyer Attributes</title>
    <style>
      :root {
        --green: #0a5f3c;
        --ink: #1a1a1a;
        --muted: #6b7280;
        --line: #e5e7eb;
        --bg: #f7f8f7;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font:
          15px/1.5 system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        color: var(--ink);
        background: var(--bg);
        margin: 0;
      }
      header {
        background: var(--green);
        color: #fff;
        padding: 18px 24px;
      }
      header h1 {
        margin: 0;
        font-size: 19px;
      }
      header p {
        margin: 2px 0 0;
        opacity: 0.85;
        font-size: 13px;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px 24px 60px;
      }
      #dropzone {
        border: 2px dashed var(--green);
        border-radius: 10px;
        background: #fff;
        padding: 22px;
        text-align: center;
        cursor: pointer;
        transition: background 0.15s;
        display: block;
      }
      #dropzone.drag {
        background: #eafaf1;
      }
      #dropzone.loaded {
        padding: 10px;
        font-size: 13px;
        opacity: 0.8;
      }
      #dropzone strong {
        color: var(--green);
      }
      #file {
        display: none;
      }
      .cards {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 14px 0 18px;
      }
      .card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 16px;
        min-width: 150px;
        flex: 1;
      }
      .card-v {
        font-size: 24px;
        font-weight: 700;
      }
      .card-l {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
        margin-top: 2px;
      }
      .card-s {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }
      .panel {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px 18px;
        margin: 16px 0;
      }
      .panel h2 {
        margin: 0 0 8px;
        font-size: 15px;
      }
      table.tbl {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .tbl th,
      .tbl td {
        text-align: left;
        padding: 7px 8px;
        border-bottom: 1px solid var(--line);
      }
      .tbl th {
        color: var(--muted);
        font-weight: 600;
        font-size: 12px;
      }
      .tbl th.sortable {
        cursor: pointer;
        user-select: none;
      }
      .tbl th.sortable:hover {
        color: var(--ink);
      }
      .tbl td.num,
      .tbl th.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .tbl.click tr.row {
        cursor: pointer;
      }
      .tbl.click tr.row:hover {
        background: #f3fbf7;
      }
      .caret {
        color: var(--muted);
        font-size: 11px;
      }
      .tbl .detail > td {
        background: #fafafa;
        padding: 6px 8px 12px 28px;
      }
      .tbl.sub {
        margin: 0;
      }
      .tbl.sub th,
      .tbl.sub td {
        border-bottom: 1px solid #eee;
        padding: 4px 8px;
      }
      code {
        background: #f2f2f2;
        padding: 0.05rem 0.3rem;
        border-radius: 3px;
        font-size: 12px;
      }
      .muted {
        color: var(--muted);
      }
      .small {
        font-size: 11px;
      }
      .unit {
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 10px;
      }
      .controls input,
      .controls select {
        font: inherit;
        padding: 5px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
      }
      .controls label {
        font-size: 13px;
        color: var(--muted);
      }
      details.panel > summary {
        cursor: pointer;
        list-style: none;
      }
      details.panel > summary::-webkit-details-marker {
        display: none;
      }
      details.panel > summary h2 {
        display: inline-block;
      }
      details.panel > summary::before {
        content: "▸ ";
        color: var(--muted);
      }
      details.panel[open] > summary::before {
        content: "▾ ";
      }
      .disclaimer {
        color: var(--muted);
        font-size: 12px;
        margin-top: 20px;
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }
      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
        padding: 16px;
        border-radius: 10px;
      }
      .viewbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 18px;
        align-items: center;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 14px;
        margin: 14px 0;
      }
      .viewbar label {
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        user-select: none;
      }
      .tag {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        padding: 0 5px;
        border-radius: 4px;
        vertical-align: middle;
        margin-left: 4px;
      }
      .tag-bogo {
        background: #fef3c7;
        color: #92400e;
      }
      .tag-reward {
        background: #ede9fe;
        color: #6d28d9;
      }
      .tag-gift {
        background: #dbeafe;
        color: #1e40af;
      }
      .panel.rewards {
        border-left: 4px solid #2563eb;
      }
      .panel.reorder {
        border-left: 4px solid #0d9488;
      }
      .tag-bulk {
        background: #fef3c7;
        color: #92400e;
      }
      .cat-pill {
        display: inline-block;
        font-size: 10px;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 0 5px;
        margin-left: 4px;
        vertical-align: middle;
      }
      .panel.actions {
        border-left: 4px solid #d97706;
      }
      .panel.actions h2 {
        margin-bottom: 4px;
      }
      ol.act-list {
        list-style: none;
        margin: 8px 0 0;
        padding: 0;
      }
      ol.act-list li {
        display: flex;
        gap: 12px;
        padding: 10px 0;
        border-top: 1px solid var(--line);
      }
      ol.act-list li:first-child {
        border-top: 0;
      }
      .rank-n {
        flex: 0 0 24px;
        height: 24px;
        border-radius: 999px;
        background: var(--green);
        color: #fff;
        font-weight: 700;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .act-head {
        font-weight: 600;
      }
      .act-detail {
        color: #374151;
        font-size: 13px;
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Buyer Attributes — who buys what</h1>
      <p>
        Load the orders CSV (from Button 2) to see each member's products and
        find everyone who buys a given item.
      </p>
    </header>
    <main>
      <label id="dropzone" for="file">
        <strong>Drop your <code>orders_master.csv</code> here</strong> or click
        to choose it. (That's the file Button 2 keeps adding to; any
        <code>orders_….csv</code> works too.)
        <input id="file" type="file" accept=".csv,text/csv" />
      </label>
      <div id="app"></div>
    </main>
