<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>doTERRA — PV Forecast & Gap Tracker</title>
    <style>
      :root {
        --green: #0a5f3c;
        --ink: #1a1a1a;
        --muted: #6b7280;
        --line: #e5e7eb;
        --bg: #f7f8f7;
        --inactive: #b91c1c;
        --declining: #d97706;
        --steady: #2563eb;
        --growing: #0a7d4f;
        --reactivating: #0891b2;
        --new: #7c3aed;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font:
          15px/1.5 system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        color: var(--ink);
        background: var(--bg);
        margin: 0;
      }
      header {
        background: var(--green);
        color: #fff;
        padding: 18px 24px;
      }
      header h1 {
        margin: 0;
        font-size: 19px;
      }
      header p {
        margin: 2px 0 0;
        opacity: 0.85;
        font-size: 13px;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px 24px 60px;
      }
      #dropzone {
        display: block;
        border: 2px dashed var(--green);
        border-radius: 10px;
        background: #fff;
        padding: 22px;
        text-align: center;
        cursor: pointer;
        transition: background 0.15s;
      }
      #dropzone.drag {
        background: #eafaf1;
      }
      #dropzone.loaded {
        padding: 10px;
        font-size: 13px;
        opacity: 0.8;
      }
      #dropzone strong {
        display: block;
        color: var(--green);
        font-size: 16px;
      }
      #dropzone .sub {
        display: block;
        margin-top: 6px;
        font-size: 13px;
        color: var(--muted);
      }
      .dz-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .dz-btn {
        display: inline-block;
        padding: 9px 18px;
        border-radius: 8px;
        cursor: pointer;
        background: var(--green);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
      }
      #file {
        display: none;
      }
      .asof {
        color: var(--muted);
        font-size: 13px;
        margin: 14px 2px;
      }
      .cards {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 8px 0 18px;
      }
      .card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 16px;
        min-width: 150px;
        flex: 1;
      }
      .card-v {
        font-size: 24px;
        font-weight: 700;
      }
      .card-v .unit {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
      }
      .card-l {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
        margin-top: 2px;
      }
      .card-s {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }
      .panel {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px 18px;
        margin: 16px 0;
      }
      .panel h2 {
        margin: 0 0 12px;
        font-size: 15px;
      }
      .orgchart {
        display: block;
        margin-bottom: 14px;
      }
      .bar {
        fill: #9bb7a8;
      }
      .bar-prog {
        fill: #cfe3d8;
      }
      .bar-fc {
        fill: var(--green);
        opacity: 0.85;
      }
      .whisker {
        stroke: #084c30;
        stroke-width: 1.5;
      }
      .axis {
        fill: var(--muted);
        font-size: 9px;
      }
      table.tbl {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .tbl th,
      .tbl td {
        text-align: left;
        padding: 7px 8px;
        border-bottom: 1px solid var(--line);
      }
      .tbl th {
        color: var(--muted);
        font-weight: 600;
        font-size: 12px;
      }
      .tbl th.sortable {
        cursor: pointer;
        user-select: none;
      }
      .tbl th.sortable:hover {
        color: var(--ink);
      }
      .tbl td.num,
      .tbl th.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .muted {
        color: var(--muted);
      }
      .small {
        font-size: 11px;
      }
      .unit {
        color: var(--muted);
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 10px;
      }
      .controls input,
      .controls select {
        font: inherit;
        padding: 5px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
      }
      .controls label {
        font-size: 13px;
        color: var(--muted);
      }
      .spark {
        color: var(--steady);
        vertical-align: middle;
      }
      .spark-cell {
        width: 100px;
      }
      .badge {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
      }
      .s-inactive {
        color: var(--inactive);
      }
      .badge.s-inactive {
        background: var(--inactive);
      }
      .s-declining {
        color: var(--declining);
      }
      .badge.s-declining {
        background: var(--declining);
      }
      .s-steady {
        color: var(--steady);
      }
      .badge.s-steady {
        background: var(--steady);
      }
      .s-growing {
        color: var(--growing);
      }
      .badge.s-growing {
        background: var(--growing);
      }
      .s-reactivating {
        color: var(--reactivating);
      }
      .badge.s-reactivating {
        background: var(--reactivating);
      }
      .s-new {
        color: var(--new);
      }
      .badge.s-new {
        background: var(--new);
      }
      .spark-cell.s-inactive .spark,
      .spark-cell.s-declining .spark {
        color: currentColor;
      }
      .disclaimer {
        color: var(--muted);
        font-size: 12px;
        margin-top: 20px;
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }
      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
        padding: 16px;
        border-radius: 10px;
      }
      .legend {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 14px;
        margin: 8px 2px 14px;
        font-size: 12px;
      }
      .legend-title {
        color: var(--muted);
        font-weight: 600;
      }
      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      /* --- progressive-disclosure additions --- */
      .ok {
        color: var(--growing);
        font-weight: 600;
      }
      .warn {
        color: var(--declining);
        font-weight: 600;
      }
      .po3-confirm {
        border-left: 4px solid var(--declining);
      }
      .panel.boost {
        border-left: 4px solid #b45309;
      }
      .po3-fields {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 12px;
        margin-top: 10px;
      }
      .po3o {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .po3o-l {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--muted);
      }
      .po3o input {
        font-size: 15px;
        padding: 7px 9px;
        border: 1px solid var(--line);
        border-radius: 7px;
        width: 100%;
      }
      .po3o input:focus {
        outline: 2px solid var(--green);
        border-color: var(--green);
      }
      .po3o-c {
        font-size: 11px;
      }
      .timebar {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #fff;
        border: 1px solid var(--line);
        border-left: 4px solid var(--green);
        border-radius: 10px;
        padding: 10px 14px;
        margin: 14px 0 8px;
        font-size: 15px;
      }
      .timebar.urgent {
        border-left-color: var(--declining);
        background: #fffbeb;
      }
      .timebar strong {
        font-size: 18px;
      }
      .timebar .hourglass {
        font-size: 18px;
      }
      .timebar .asof {
        margin-left: auto;
        color: var(--muted);
        font-size: 12px;
      }
      .panel.client {
        border-left: 4px solid var(--green);
      }
      .client-head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .client-head h2 {
        margin: 0;
      }
      .pill {
        background: #eafaf1;
        color: var(--green);
        border: 1px solid #bfe6d2;
        font-size: 12px;
        font-weight: 600;
        padding: 2px 10px;
        border-radius: 999px;
      }
      .your-path {
        margin: 0 0 12px;
        padding: 9px 12px;
        background: #eafaf1;
        border: 1px solid #bfe6d2;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--ink);
      }
      .client-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 12px;
      }
      .cg {
        background: var(--bg);
        border-radius: 8px;
        padding: 10px 12px;
      }
      .cg-l {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--muted);
        margin-bottom: 3px;
      }
      .cg-v {
        font-size: 14px;
      }
      .card.accent {
        border-color: var(--green);
        background: #f3fbf7;
      }
      .panel.actions {
        border-left: 4px solid var(--declining);
      }
      ol.act-list {
        list-style: none;
        margin: 8px 0 0;
        padding: 0;
      }
      ol.act-list li {
        display: flex;
        gap: 12px;
        padding: 10px 0;
        border-top: 1px solid var(--line);
      }
      ol.act-list li:first-child {
        border-top: 0;
      }
      .rank-n {
        flex: 0 0 24px;
        height: 24px;
        border-radius: 999px;
        background: var(--green);
        color: #fff;
        font-weight: 700;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .act-head {
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .act-detail {
        color: #374151;
        font-size: 13px;
        margin-top: 2px;
      }
      .badge.frontline {
        background: var(--green);
      }
      ul.reengage {
        margin: 6px 0;
        padding-left: 18px;
        font-size: 13px;
      }
      ul.reengage li {
        margin: 3px 0;
      }
      .divider {
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 28px 0 4px;
        position: relative;
      }
      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 38%;
        height: 1px;
        background: var(--line);
      }
      .divider::before {
        left: 0;
      }
      .divider::after {
        right: 0;
      }
      details.panel > summary {
        cursor: pointer;
        list-style: none;
      }
      details.panel > summary::-webkit-details-marker {
        display: none;
      }
      details.panel > summary h2 {
        display: inline-block;
      }
      details.panel > summary::before {
        content: "▸ ";
        color: var(--muted);
      }
      details.panel[open] > summary::before {
        content: "▾ ";
      }
    </style>
  </head>
  <body>
    <header>
      <h1>PV Forecast &amp; Gap Tracker</h1>
      <p>
        Load a genealogy CSV (from Button 1) to see who's on track, ahead, or
        needs attention.
      </p>
    </header>
    <main>
      <div id="dropzone">
        <strong>Load your genealogy</strong>
        <span class="sub"
          >Click below to pick your <code>genealogy_master.csv</code> file — or
          drag it here.</span
        >
        <span class="dz-actions">
          <label class="dz-btn" for="file">Choose CSV file…</label>
        </span>
        <input id="file" type="file" accept=".csv,text/csv" multiple />
      </div>
      <div id="app"></div>
    </main>
